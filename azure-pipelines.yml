trigger: none

pool:
  vmImage: ubuntu-latest

variables:
  TAG: $(Build.BuildId)

stages:
  - stage: BuildFrontend
    displayName: Build Frontend image
    jobs:
      - job: Build
        steps:
        - checkout: self

        - task: Docker@2
          displayName: Login to DockerHub
          inputs:
            command: login
            containerRegistry: dockerhub-service-connection

        - task: Docker@2
          displayName: Build Image
          inputs:
            command: build
            repository: akashsheoarn/ecom-frontend
            dockerfile: frontend/Dockerfile
            tags: |
              $(TAG)
              latest

        - task: Docker@2
          displayName: Push Image
          inputs:
            command: push
            repository: akashsheoarn/ecom-frontend
            tags: |
              $(TAG)
              latest

        - script: |
            git clone https://github.com/akash66sheoran/ecom-gitops.git
            cd ecom-gitops
            git checkout main

            cd helm

            sed -i '/frontend:/,/tag:/ s/tag:.*/tag: "'$(TAG)'"/' values.yaml

            git config user.email "akash66sheoran@gmail.com"
            git config user.name "akash66sheoran"

            git add values.yaml
            git commit -m "Update frontend image tag to $(TAG)"

            git remote set-url origin https://$(ECOM-GITOPS-REPO-PAT)@github.com/akash66sheoran/ecom-gitops.git
            git push origin main
          displayName: Update Frontend Helm values

  - stage: BuildBackend
    displayName: Build Backend image
    jobs:
      - job: Build
        steps:
        - checkout: self

        - task: Docker@2
          displayName: Login to DockerHub
          inputs:
            command: login
            containerRegistry: dockerhub-service-connection

        - task: Docker@2
          displayName: Build Image
          inputs:
            command: build
            repository: akashsheoarn/ecom-backend
            dockerfile: backend/Dockerfile
            tags: |
              $(TAG)
              latest

        - task: Docker@2
          displayName: Push Image
          inputs:
            command: push
            repository: akashsheoarn/ecom-backend
            tags: |
              $(TAG)
              latest

        - script: |
            git clone https://github.com/akash66sheoran/ecom-gitops.git
            cd ecom-gitops
            git checkout main

            cd helm

            sed -i '/backend:/,/tag:/ s/tag:.*/tag: "'$(TAG)'"/' values.yaml

            git config user.email "akash66sheoran@gmail.com"
            git config user.name "akash66sheoran"

            git add values.yaml
            git commit -m "Update backend image tag to $(TAG)"

            git remote set-url origin https://$(ECOM-GITOPS-REPO-PAT)@github.com/akash66sheoran/ecom-gitops.git
            git push origin main
          displayName: Update Backend Helm values